name: Run Pytest

on:
    pull_request:
        branches:
            - main # Change this to your default branch if different

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                  version: "latest"

            - name: Install dependencies
              working-directory: backend
              run: uv sync --group dev

            - name: Run Pytest
              working-directory: backend
              run: uv run pytest -v
