name: Run Pytest

on:
    pull_request:
        branches:
            - main # Change this to your default branch if different

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.x" # Specify the Python version you need

            - name: Install dependencies
              run: |
                  pip install pytest  # Add any other dependencies as needed

            - name: Run Pytest
              run: |
                  pytest  # You can add flags like -v for verbose output
