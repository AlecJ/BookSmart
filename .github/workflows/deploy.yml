name: Deploy

on:
    push:
        branches:
            - main
        paths:
            - "backend/**"
            - "terraform/**"
            - ".github/workflows/deploy.yml"

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: alecj/booksmart-backend

jobs:
    build-push:
        name: Build & Push Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write # Required to push to GHCR

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push image
              uses: docker/build-push-action@v6
              with:
                  context: ./backend
                  push: true
                  # Tag with both :latest and the git SHA.
                  # Terraform uses the SHA tag so it can detect a real change and trigger a Render redeploy.
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    terraform-apply:
        name: Terraform Apply
        runs-on: ubuntu-latest
        needs: build-push

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3
              with:
                  cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

            - name: Terraform Init
              working-directory: terraform
              run: terraform init

            - name: Terraform Apply
              working-directory: terraform
              # image_tag is the only variable passed from CI — all secrets are stored in Terraform Cloud.
              # Changing the SHA causes Terraform to update the Render service, triggering a redeploy.
              run: terraform apply -auto-approve -var="image_tag=${{ github.sha }}"
